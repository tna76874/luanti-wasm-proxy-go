name: Build, Push Docker & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/luanti-wasm-proxy-go:latest
            ghcr.io/${{ github.repository_owner }}/luanti-wasm-proxy-go:${{ github.sha }}

      - name: Build Linux executable
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -o luantiproxy-linux-amd64 main.go

      - name: Build Windows executable
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: amd64
        run: |
          go build -o luantiproxy-windows-amd64.exe main.go

      - name: Get current date tag
        id: date
        run: echo "tag_name=$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.date.outputs.tag_name }}
          name: Release ${{ steps.date.outputs.tag_name }}
          files: |
            luantiproxy-linux-amd64
            luantiproxy-windows-amd64.exe
          generate_release_notes: true
